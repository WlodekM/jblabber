syntax = "proto3";

// announce to everyone that this client supports jabber
// also included are the username and the hash of the public key
message JabberIdentify {
	string username = 1;
	bytes hash = 2;
}

// initiate handshake with jabber user
message JabberHello {
	JabberIdentify me = 3;
	bytes public_key = 4;
}
// finish handshake
message JabberHelloResponse {
	JabberIdentify me = 3;
	bytes encrypted_public_key = 5;
}
message JabberHandshakeReject {
	// JabberIdentify me = 3;
	// bytes public_key = 4;
}

/*handshake example
